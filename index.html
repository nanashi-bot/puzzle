<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Slide Puzzle</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-image: url("https://picsum.photos/300");
    margin: 0;
  }
  #puzzle {
    width: 300px;
    height: 300px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
  }
  .tile {
    width: 100%;
    height: 100%;
    background-image: url("https://picsum.photos/300");
    background-size: 300px 300px;
  }
  .empty {
    background: #ddd;
  }
</style>
</head>
<body>

<div id="puzzle"></div>

<script>
const puzzle = document.getElementById("puzzle");
let tiles = [...Array(9).keys()];

function draw() {
  puzzle.innerHTML = "";
  tiles.forEach((n, i) => {
    const div = document.createElement("div");
    if (n === 8) {
      div.className = "tile empty";
    } else {
      div.className = "tile";
      div.style.backgroundPosition = 
        `${-(n % 3) * 100}px ${-Math.floor(n / 3) * 100}px`;
      div.onclick = () => move(i);
    }
    puzzle.appendChild(div);
  });
}

function move(i) {
  const empty = tiles.indexOf(8);
  const valid = [i-1, i+1, i-3, i+3];
  if (valid.includes(empty)) {
    [tiles[i], tiles[empty]] = [tiles[empty], tiles[i]];
    draw();
  }
}

tiles.sort(() => Math.random() - 0.5);
draw();
</script>

</body>
</html>
